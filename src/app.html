<!doctype html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <link rel="icon" href="%sveltekit.assets%/favicon.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="manifest" href="%sveltekit.assets%/manifest.json" />
        %sveltekit.head%
        <style>
            #boot-loader {
                position: fixed;
                inset: 0;
                z-index: 2147483647;
                display: grid;
                place-items: center;
                overflow: hidden;
                background: var(--background);
                color: var(--foreground);
                font:
                    14px system-ui,
                    sans-serif;
                transition: opacity 0.2s ease;
            }
            #boot-bg {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
                opacity: 0.3;
                mask-image: linear-gradient(to bottom, black 30%, transparent 80%);
                -webkit-mask-image: linear-gradient(to bottom, black 30%, transparent 80%);
            }
            #boot-wrap {
                position: relative;
                display: flex;
                flex-direction: column;
                gap: 0.75rem;
                align-items: center;
            }
            .spinner {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                border: 3px solid color-mix(in srgb, var(--primary) 30%, transparent);
                border-top-color: var(--primary);
                animation: spin 1s linear infinite;
            }
            #boot-msg {
                opacity: 0.8;
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>
    <body
        data-sveltekit-preload-data="hover"
        class="dark">
        <div id="boot-loader">
            <img id="boot-bg" src="https://medias.n-corp.fr/ncorp/games/hytale/screenshot_full_1.webp" alt="" />
            <div id="boot-wrap" class="relative">
                <img src="%sveltekit.assets%/logo_small.png" alt="Logo" width="40" height="auto" />
                <div class="spinner absolute" role="img" aria-label="Chargement"></div>
            </div>
        </div>

        <div style="display: contents">%sveltekit.body%</div>

        <script>
            // Hide API, sera appellée dans hooks.client.ts (init)
            window.__hideBoot = function () {
                const el = document.getElementById("boot-loader");
                if (!el) return;
                el.style.opacity = "0";
                el.addEventListener("transitionend", () => el.remove(), { once: true });
                //setTimeout(() => el && el.remove(), 300);
            };

            // Failsafe ultime au cas où
            setTimeout(() => window.__hideBoot?.(), 8000);
        </script>
    </body>
</html>
